<svg
  width="58"
  height="58"
  viewBox="0 0 58 58"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="XU Software logo mark"
>
  <defs>
    <linearGradient
      id="logoGrad"
      x1="0"
      y1="0"
      x2="58"
      y2="58"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <radialGradient id="radialGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Soft radial glow behind center -->
  <circle cx="29" cy="29" r="20" fill="url(#radialGlow)" />

  <!-- Diagonal lines -->
  <line
    x1="8"
    y1="8"
    x2="50"
    y2="50"
    stroke="url(#logoGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <line
    x1="50"
    y1="8"
    x2="8"
    y2="50"
    stroke="url(#logoGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <!-- Corner nodes -->
  <circle cx="8" cy="8" r="4" fill="#3B82F6" />
  <circle cx="50" cy="8" r="4" fill="#8B5CF6" />
  <circle cx="8" cy="50" r="4" fill="#8B5CF6" />
  <circle cx="50" cy="50" r="4" fill="#3B82F6" />

  <!-- Center node -->
  <circle
    cx="29"
    cy="29"
    r="6"
    fill="#0F172A"
    stroke="url(#logoGrad)"
    stroke-width="2"
  />
  <circle cx="29" cy="29" r="2.5" fill="url(#logoGrad)" />
</svg>
